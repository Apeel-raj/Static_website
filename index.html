<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apeel Land Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-pattern { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 hero-pattern min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <!-- Decorative background elements -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-green-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute top-0 right-1/4 w-96 h-96 bg-emerald-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-teal-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>

    <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
        <div class="inline-block mb-4 px-4 py-1.5 rounded-full bg-green-100 text-green-800 text-sm font-semibold tracking-wide border border-green-200">
            Real Estate Marketplace in Nepal
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 text-slate-800">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-blue-500">APEEL</span><br/>
            Land Marketplace
        </h1>
        <p class="text-xl md:text-2xl text-slate-600 mb-12 max-w-2xl mx-auto leading-relaxed">
            The premier hub for buying and selling property in Nepal. Discover prime real estate in minutes, directly from verified owners.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
            <button onclick="window.location.href='./pages/browse-land.html'" class="group relative px-8 py-4 bg-slate-900 text-white font-semibold rounded-2xl text-lg w-full sm:w-auto overflow-hidden shadow-xl shadow-slate-900/20 hover:shadow-slate-900/40 transition-all hover:-translate-y-1">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    I Want to Buy Land
                </span>
                <div class="absolute inset-0 bg-gradient-to-r from-slate-800 to-slate-700 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
            <button onclick="window.location.href='./pages/sell-land.html'" class="group relative px-8 py-4 bg-white text-emerald-600 border-2 border-emerald-100 font-semibold rounded-2xl text-lg w-full sm:w-auto overflow-hidden shadow-lg shadow-emerald-100/50 hover:border-emerald-500 transition-all hover:-translate-y-1">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    I Want to Sell Land
                </span>
                <div class="absolute inset-0 bg-emerald-50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
        </div>
    </div>

</body>
</html>
