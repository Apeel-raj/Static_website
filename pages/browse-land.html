<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Lands - Apeel Land Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-4 py-4 md:px-8 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <a href="../index.html" class="flex items-center gap-2 text-xl font-bold tracking-tight text-slate-800 hover:text-blue-600 transition-colors uppercase">
            <img src="../logo.png" alt="Apeel Logo" class="h-8 w-auto object-contain" onerror="this.outerHTML='<span class=&quot;text-blue-600 font-extrabold&quot;>A</span>'">
            <span class="hidden sm:inline">Apeel Land</span>
        </a>
        <div class="flex gap-4">
            <a href="sell-land.html" class="text-sm font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-4 py-2 rounded-full transition-colors border border-emerald-200">Sell a Property</a>
            <a href="../index.html" class="text-sm font-medium text-slate-600 hover:text-slate-900 bg-slate-100 px-4 py-2 rounded-full transition-colors">Back</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- Header & Search -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Available Properties</h1>
                <p class="text-slate-500 mt-1">Find the perfect plot of land for your needs.</p>
            </div>
            
            <div class="w-full md:w-auto flex flex-col sm:flex-row gap-3">
                <div class="relative w-full md:w-80">
                    <svg class="absolute left-3 top-3.5 h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow" placeholder="Search by Area (e.g., Pokhara, Hemja)">
                </div>
                <button id="findNearMeBtn" class="flex items-center justify-center gap-2 px-5 py-3 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl transition-colors shadow-md whitespace-nowrap">
                    📍 Find Near Me
                </button>
            </div>
        </div>

        <!-- Initial Loading State -->
        <div id="loadingIndicator" class="flex flex-col items-center justify-center py-20 text-slate-400">
            <svg class="animate-spin h-10 w-10 mb-4 text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="font-medium animate-pulse">Loading properties...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-slate-500 text-center">
            <svg class="w-16 h-16 text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <p class="text-xl font-semibold text-slate-700 mb-2">No properties found</p>
            <p>Try adjusting your search criteria or explore a different area.</p>
        </div>

        <!-- Grid -->
        <div id="listingsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Cards rendered via JS -->
        </div>

    </main>

    <!-- App Logic -->
    <script type="module" src="../js/app.js"></script>
</body>
</html>
