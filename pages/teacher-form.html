<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Form - Tuition Finder</title>
    <link href="../css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen py-12 px-4">
    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 py-6 px-8 text-white relative">
            <a href="../index.html" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-white/80 hover:text-white font-medium">&larr; Back</a>
            <h1 class="text-2xl font-bold text-center">Register as a Teacher</h1>
        </div>
        
        <form id="teacher-form" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="full-name">Full Name</label>
                <input type="text" id="full-name" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all" placeholder="Enter your full name">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="experience">Past Teaching Experience</label>
                <textarea id="experience" rows="3" required placeholder="Where and what have you taught before?" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all resize-none"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="bio">Short Bio</label>
                <textarea id="bio" rows="2" required placeholder="Tell us a bit about yourself, your teaching style, your subjects..." class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="contact-info">Contact Number / Email</label>
                <input type="text" id="contact-info" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all" placeholder="Enter phone number or email">
            </div>
            
            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 mt-4 flex justify-center items-center">
                <span>Complete Registration</span>
            </button>
        </form>
    </div>

    <script type="module">
        import { db } from '../js/firebase-config.js';
        import { collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js';

        document.getElementById('teacher-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Saving...</span>`;
            btn.disabled = true;

            try {
                await addDoc(collection(db, 'teachers'), {
                    fullName: document.getElementById('full-name').value,
                    experience: document.getElementById('experience').value,
                    bio: document.getElementById('bio').value,
                    contactInfo: document.getElementById('contact-info').value,
                    createdAt: serverTimestamp()
                });
                window.location.href = './dashboard.html';
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("An error occurred. Please check Firebase config.");
                btn.innerHTML = `<span>Complete Registration</span>`;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
